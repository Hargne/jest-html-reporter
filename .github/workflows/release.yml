name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (no publish, no push)"
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Ensure running on master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "❌ Releases are only allowed from master"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      - name: Calculate next version
        id: version
        run: |
          CURRENT=${{ steps.get_tag.outputs.tag }}
          CURRENT=${CURRENT#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.release_type }}" in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR+1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH+1))
              ;;
          esac

          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "✅ Next version: $NEXT"

      - name: Bump package.json
        run: |
          yarn version --new-version ${{ steps.version.outputs.next }} --no-git-tag-version

      - name: Show version diff (dry run visibility)
        run: |
          echo "📦 package.json version:"
          cat package.json | grep '"version"'

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json yarn.lock || true
          git commit -m "chore(release): v${{ steps.version.outputs.next }}"
          git tag v${{ steps.version.outputs.next }}
          git push origin HEAD --tags

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.next }}
          generate_release_notes: true
